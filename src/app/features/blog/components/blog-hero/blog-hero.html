<section class="blog-hero">
  <div class="blog-hero__image-wrapper">
    <img
      src="/images/project-image.jpg"
      [alt]="'blog.hero.imageAlt' | transloco"
      class="blog-hero__image"
    />
    <div class="blog-hero__overlay"></div>
  </div>
  <div class="blog-hero__content">
    <h1 class="blog-hero__title">
      {{ 'blog.blog' | transloco }}
    </h1>
    <p class="blog-hero__description">
      {{ 'blog.description' | transloco }}
    </p>
  </div>
</section>
